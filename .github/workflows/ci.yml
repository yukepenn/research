name: ci
on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          python -m pip install numpy scipy pandas pyyaml jsonschema pytest
      - name: Validate (schema, secrets, contracts, ledger)
        run: python -m core.audit.validate
      - name: Unit + integration tests
        run: python -m pytest tests -q
      - name: Rebuild tables from ledger (reproducibility smoke)
        run: python -m core.plotting.build_all
