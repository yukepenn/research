  - {id: TDAD, arxiv: "2603.17973", note: "pre-change impact-analysis test selection for coding agents (deterministic unit tests)", collision: high}
  - {id: RiskAwareBatch, arxiv: "2604.00222", note: "ML commit-risk-scored budgeted test selection (software)", collision: medium}
  - {id: AHE, arxiv: "2604.25850", note: "automatic harness evolution (anchor; the thing we guard, not the guard)", collision: medium}
  - {id: SelfHarness, arxiv: "2606.09498", note: "self-evolving harness w/ regression gate; agent self-prediction ~random", collision: medium}
  - {id: HundredInstances, arxiv: "2409.03563", note: "selection NOT better than random for fine-grained deltas (H2 counter-evidence)", collision: high}
exact_kill_condition: "H2 fails (random ties edit-conditioned selection at fixed budget across regimes) -> auto-convert to short negative-result note."
pilot_design: "12-16 independent edits x 30 tasks x 2 model families, old/new paired, 2 repeats; baselines random / difficulty / component-heuristic / edit-conditioned selector; AgentAssay-style sequential baseline."
pilot_pass_rule: ">=25-30% edits produce a meaningful pass->fail regression; random small suite misses real regressions; edit-conditioned features carry transferable signal; full suite expensive enough that canaries matter; >=30 independent edits collectable."
kill_conditions:
  - "H2 fails: random ties selection at fixed budget -> negative-result note."
  - "Edits rarely produce hidden regressions / regressions are pure noise -> KILL."
  - "Need near-full suite to detect -> KILL."
  - "Held-out selector ~random -> drop method, descriptive corpus only."
  - "Edit corpus too small or too correlated (<~25 independent) -> flagship not viable."
full_study_design: "36-60 independent edits (>=10 real, >=10 controlled, >=10 optimizer-generated); 60-120 tasks; 2-3 models; leave-one-component-out + leave-one-lineage-out + held-out model/task; AgentAssay stacking study."
held_out_generalization: ["leave-one-edit-component-out", "leave-one-lineage-out", "held-out model family", "held-out task family"]
main_figure: "Risk-coverage / regression-recall-vs-budget curve: random vs smoke vs difficulty vs HarnessGuard, edit-bootstrap CI."
main_table: "Per-component regression rates + recall@budget + false-safe + cost saved; AgentAssay-stacking row."
judge_independence: "Regression labels from deterministic task verifiers (paired old/new); no LLM judge in primary path."
statistics: "bootstrap over EDITS (not task runs); paired-edit same-k selector comparison; sequential policy on fully held-out edits; Wilson/Clopper-Pearson for false-safe; real/controlled/optimizer reported separately."
ethical_risks: ["use only authorized/sandboxed harnesses; docker absent -> local disposable subprocess sandboxing (documented limitation)"]
resource_budget: "Tier-0 edit corpus + paired runner + features first; full old/new ground truth requires credentials + budget (HUMAN GATE)."
target_venue: "MLSys 2027 / ICLR 2027 (flagship if H2 + OOD selector strong); TMLR otherwise."
sequential_backup_venue: TMLR
