paper_id: p4_harnessguard
working_title: "HarnessGuard: Edit-Conditioned Canary Selection for Hidden-Regression Foresight in Evolving Agent Harnesses"
state: NOVELTY_PASS_NARROWED
# NARROWED 2026-06-25: AgentAssay (2603.02601) already does token-efficient agent regression
# testing with 3-valued PASS/FAIL/INCONCLUSIVE + SPRT (owns "cheap testing" + "abstention").
# TDAD (2603.17973) / Risk-Aware Batch Testing (2604.00222) own edit/diff-conditioned test
# SELECTION before a full run. Survival = edit-CONDITIONED, diversity-aware canary SELECTION
# on the per-task pass->fail regression-DELTA label, predicting the regression set BEFORE the
# suite, with held-out OOD generalization across edit/task/model families. H2 is a hard gate.
central_claim: >
  An edit-conditioned, diversity-aware canary SELECTOR — using a structured representation of
  a harness edit + historical task traces to predict per-task pass->fail regression before the
  full suite — achieves higher hidden-regression recall at fixed canary budget than random,
  difficulty, and static-diff selection, AND its risk model generalizes to HELD-OUT edit
  types, task families, and model families. This SELECTION lever stacks on top of
  AgentAssay-style trials-per-test reduction (combined beats either alone).
falsifiable_hypotheses:
  - "H1 (setup, credited): a non-trivial fraction of average-improving edits cause task-level pass->fail regressions (phenomenon already shown by Self-Harness/Layer-Isolated)."
  - "H2 (HARD GATE / PRIMARY): edit-conditioned selection beats RANDOM canaries at the SAME budget; concede the effect-size/budget regime where random ties (per 2409.03563, 2510.08730). If random ties everywhere, auto-convert to negative result."
  - "H3: a structured edit representation beats edit-agnostic selection (historical-failure prior, diversity-only, IRT/anchor subset)."
  - "H4 (calibration): abstain/escalate is at least as risk-controlled as AgentAssay INCONCLUSIVE+SPRT, at lower task budget."
  - "H5: risk structure transfers to held-out edit type / task family / model family."
unit_of_analysis: harness edit (clustered by lineage); tasks nested within
intervention: edit-conditioned canary selector + sequential ACCEPT/REJECT/ESCALATE policy
primary_endpoint: "Regression recall at fixed canary budget on HELD-OUT edits + dangerous false-acceptance rate (risk-coverage curve, edit-group bootstrap)."
practical_effect_threshold: "Selector beats random at matched budget by a pre-set recall margin on >=2 held-out splits; set after pilot."
strongest_baselines:
  - random k canaries
  - fixed smoke suite
  - historical-difficulty selection
  - capability/coverage stratified selection
  - edit-text/task embedding similarity
  - static diff-size heuristic
  - AgentAssay-style SPRT + trace-reuse + INCONCLUSIVE (primary must-beat / stack-with, 2603.02601)
  - TDAD static impact selection (2603.17973) / Risk-Aware Batch ML edit-risk (2604.00222)
  - run-full-suite (upper baseline) / edit-author self-prediction / oracle selector upper bound
exact_novelty_delta: >
  Not cheap agent testing (AgentAssay), not abstention (AgentAssay/SPRT), not diff-conditioned
  RTS (TDAD/Risk-Aware-Batch): the contribution is edit-CONDITIONED + diversity-aware canary
  SELECTION on the stochastic per-task regression-DELTA label, predicting the regression set
  PRE-suite, modeling model x harness interaction, with held-out OOD generalization of the
  SELECTOR itself — none of the neighbors do the OOD selector study, and the SELECTION lever
  is orthogonal to AgentAssay's trials-per-test lever.
nearest_neighbors:
